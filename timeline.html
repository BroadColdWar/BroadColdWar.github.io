      <h1>Clickable Timeline</h1>
      <p>Click each file tab to expand the explanation.</p>
    </section>

    <section class="timeline-list">
      <button class="timeline-item">
        <strong>1945</strong>
        <span>Germany and Berlin are divided after World War II.</span>
        <small>
          The Allies divide Germany into occupation zones. Berlin is also divided
          into four sectors. This setup creates the future conflict over who controls
          Germany and what political system it will follow.
        </small>
      </button>

      <button class="timeline-item">
        <strong>1948-1949</strong>
        <span>Berlin Blockade and Airlift.</span>
        <small>
          Stalin's Soviet Union blocks land routes into West Berlin. The United
          States and its allies respond with the Berlin Airlift. This makes Berlin
          one of the first major Cold War flashpoints.
        </small>
      </button>

      <button class="timeline-item">
        <strong>1961</strong>
        <span>The Berlin Wall is built.</span>
        <small>
          East Germany closes the border overnight and begins building barriers.
          The official excuse is protection from the West, but the main goal is
          stopping East Germans from fleeing.
        </small>
      </button>

      <button class="timeline-item">
        <strong>1963</strong>
        <span>Kennedy visits West Berlin.</span>
        <small>
          John F. Kennedy's Berlin speech shows that the United States sees West
          Berlin as a symbol of freedom inside the Soviet sphere of influence.
        </small>
      </button>

      <button class="timeline-item">
        <strong>1987</strong>
        <span>Reagan challenges Gorbachev.</span>
        <small>
          Ronald Reagan calls on Soviet leader Mikhail Gorbachev to "tear down
          this wall." The line became famous because it connected the Wall to the
          larger question of reform in the Soviet bloc.
        </small>
      </button>

      <button class="timeline-item">
        <strong>1989</strong>
        <span>The Wall opens.</span>
        <small>
          Protests, pressure for reform, and confusion over travel rules lead East
          Germans to cross into West Berlin. The fall of the Wall becomes a turning
          point near the end of the Cold War.
        </small>
      </button>
    </section>
