    <section class="page-title">
      <h1>Interactive Timeline</h1>
      <p>Click each year to expand a quick explanation. Add more detail once research is finished.</p>
    </section>

    <section class="timeline-list">
      <button class="timeline-item">
        <strong>1945</strong>
        <span>Germany and Berlin are divided after World War II.</span>
        <small>The Allies split Germany into occupation zones. Berlin is also divided, even though it is inside the Soviet zone.</small>
      </button>

      <button class="timeline-item">
        <strong>1948-1949</strong>
        <span>Berlin Blockade and Airlift.</span>
        <small>The Soviet Union blocks land routes into West Berlin. The Western Allies supply the city by air.</small>
      </button>

      <button class="timeline-item">
        <strong>1961</strong>
        <span>The Berlin Wall goes up.</span>
        <small>East Germany closes the border and begins building the Wall to stop people from fleeing west.</small>
      </button>

      <button class="timeline-item">
        <strong>1963</strong>
        <span>Kennedy gives his Berlin speech.</span>
        <small>His speech is meant to show American support for West Berlin and resistance to Soviet pressure.</small>
      </button>

      <button class="timeline-item">
        <strong>1987</strong>
        <span>Reagan says: "Tear down this wall."</span>
        <small>The speech becomes part of the political pressure and symbolism surrounding the Wall.</small>
      </button>

      <button class="timeline-item">
        <strong>1989</strong>
        <span>The Wall opens.</span>
        <small>Mass protests and confusion over travel rules lead East Germans to cross freely into West Berlin.</small>
      </button>
    </section>
